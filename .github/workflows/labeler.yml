name: "Pull Request Labeler"

on:
  workflow_call:
    inputs:
      artifact_id:
        description: 'Unique identifier for artifacts'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      # Step 1: Harden the runner
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit

      # Step 2: Run the labeler
      - name: Apply Labels to Pull Request
        id: label_step
        uses: srvaroa/labeler@e216fb40e2e6d3b17d90fb1d950f98bee92f65ce # master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # Step 3: Fetch Applied Labels Programmatically
      - name: Fetch Applied Labels
        id: fetch_labels
        run: |
          echo "Fetching applied labels from the GitHub API..."
          PR_NUMBER=$(echo "${{ github.event.pull_request.number }}")
          REPO="${{ github.repository }}"
          LABELS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$REPO/issues/$PR_NUMBER | jq -r '.labels[].name')

          echo "Labels applied to the pull request: $LABELS"
          echo "applied_labels=$LABELS" >> $GITHUB_OUTPUT

      # Step 4: Generate label artifact with meaningful results
      - name: Generate label artifact
        run: |
          echo "Generating label artifact with meaningful data..."
          mkdir -p labeler

          echo "Workflow Name: Pull Request Labeler" > labeler/labeler.txt
          echo "Artifact ID: ${{ inputs.artifact_id }}" >> labeler/labeler.txt

          if [[ -n "${{ steps.fetch_labels.outputs.applied_labels }}" ]]; then
            echo "Labels Applied:" >> labeler/labeler.txt
            echo "${{ steps.fetch_labels.outputs.applied_labels }}" >> labeler/labeler.txt
          else
            echo "No labels were applied." >> labeler/labeler.txt
          fi

      # Step 5: Upload the artifact
      - name: Upload label artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_id }}
          path: labeler/