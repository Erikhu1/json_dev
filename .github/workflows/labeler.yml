name: "Pull Request Labeler"

on:
  workflow_call:
    inputs:
      artifact_id:
        description: 'Unique identifier for artifacts'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  clone_missing_labels:
    runs-on: ubuntu-latest
  
    steps:
    - name: compare labels
      run: |

        # Source repository (the one we're cloning labels FROM)
        SOURCE_REPO="nlohmann/json"

        # Destination repository (the current repository)
        TARGET_REPO="erikhu1/json_dev"

        echo "Fetching labels from $SOURCE_REPO..."
        SOURCE_LABELS=$(gh api -X GET "repos/$SOURCE_REPO/labels" | jq -c '.[]')

        echo "Fetching labels from $TARGET_REPO..."
        TARGET_LABELS=$(gh api -X GET "repos/$TARGET_REPO/labels" | jq -c '.[]')

        echo "Cloning missing labels from $SOURCE_REPO to $TARGET_REPO..."

        # Loop through all labels in the source repository
        while IFS= read -r source_label; do
          LABEL_NAME=$(echo "$source_label" | jq -r '.name')
          LABEL_COLOR=$(echo "$source_label" | jq -r '.color')
          LABEL_DESCRIPTION=$(echo "$source_label" | jq -r '.description')

          # Check if the label already exists in the target repo
          LABEL_EXISTS=$(echo "$TARGET_LABELS" | jq -r --arg NAME "$LABEL_NAME" '. | map(select(.name == $NAME)) | length')

          if [ "$LABEL_EXISTS" -eq 0 ]; then
            # Create the label in the target repository if it doesn't exist
            echo "Creating label: $LABEL_NAME..."
            gh api -X POST "repos/$TARGET_REPO/labels" -f name="$LABEL_NAME" -f color="$LABEL_COLOR" -f description="$LABEL_DESCRIPTION"
          else
            echo "Label '$LABEL_NAME' already exists in $TARGET_REPO. Skipping..."
          fi
        done <<< "$SOURCE_LABELS"

        echo "All labels cloned successfully!"


  label:
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      # Step 1: Harden the runner
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit

      # Step 2: Run the labeler and capture output
      - name: Apply Labels to Pull Request
        id: label_step
        uses: srvaroa/labeler@e216fb40e2e6d3b17d90fb1d950f98bee92f65ce # master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true # So the workflow continues even if labeling fails

      # Step 3: Generate label artifact from PR labels
      - name: Generate label artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Generating label artifact..."
          mkdir -p labeler

          echo "Workflow Name: Pull Request Labeler" > labeler/labeler.txt
          echo "Artifact ID: ${{ inputs.artifact_id }}" >> labeler/labeler.txt

          # Get PR number from GitHub context
          PR_NUMBER=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")

          # Fetch labels from the PR using GitHub API
          LABELS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" | jq -r '.[].name' | xargs)

          if [[ -n "$LABELS" ]]; then
            echo "Labels Applied:" >> labeler/labeler.txt
            echo "$LABELS" >> labeler/labeler.txt
          else
            echo "No labels were applied." >> labeler/labeler.txt
          fi

      # Step 4: Upload the artifact
      - name: Upload label artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_id }}
          path: labeler/
