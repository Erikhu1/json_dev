# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required,
# PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
name: 'Dependency Review'
on:  
  workflow_call:
    inputs:
      artifact_id:
        description: 'Unique identifier for artifacts'
        required: true
        type: string


permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@ce3cf9537a52e8119d91fd484ab5b8a807627bf8 # v4.6.0

      - name: Generate Dependency Review Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating Dependency Review artifact..."

          # Create a directory for the artifact
          mkdir -p dependency_review

          # File 1: General dependency_review of the workflow
          echo "Workflow Name: Dependency Review" > dependency_review/dependency_review.txt
          echo "Artifact ID: ${{ inputs.artifact_id }}" >> dependency_review/.txt

          # Fetch output from Dependency Review Action
          if [ -f "$GITHUB_STEP_dependency_review" ]; then
            echo "Dependency Review dependency_review:" >> dependency_review/dependency_review.txt
            cat "$GITHUB_STEP_dependency_review" >> dependency_review/dependency_review.txt
          else
            echo "No dependency vulnerabilities detected or dependency_review not generated." >> dependency_review/dependency_review.txt
          fi

          # Fetch detailed report from API (optional for advanced insights)
          echo "" >> dependency_review/dependency_review.txt
          echo "Fetching detailed Dependency Review report..." >> dependency_review/dependency_review.txt
          PR_NUMBER=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")

          VULNERABILITIES=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/dependency-review/" | jq '.')

          if [[ -n "$VULNERABILITIES" ]]; then
            echo "Detailed Vulnerabilities (if any):" >> dependency_review/dependency_review.txt
            echo "$VULNERABILITIES" >> dependency_review/dependency_review.txt
          else
            echo "No detailed vulnerability data available." >> dependency_review/dependency_review.txt
          fi

      - name: Upload Dependency Review Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_id }}
          path: dependency_review/