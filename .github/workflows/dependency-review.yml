# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required,
# PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
name: 'Dependency Review'
on:  
  workflow_call:
    inputs:
      artifact_id:
        description: 'Unique identifier for artifacts'
        required: true
        type: string


permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Run the Dependency Review action
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4.6.0

      # Capture Logs and Save to Artifact
      - name: Save Dependency Review logs
        run: |
          mkdir -p dependency_review
          echo "== Dependency Review Logs ==" > dependency_review/dependency_review.txt
          gh workflow view ${{ github.workflow }} --job dependency-review --log >> dependency_review/dependency_review.txt || echo "Could not fetch logs"
        
      - name: Upload dependency_review artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_id }}
          path: dependency_review/