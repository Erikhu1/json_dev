name: 'Dependency Review'
on:  
  workflow_call:
    inputs:
      artifact_id:
        description: 'Unique identifier for artifacts'
        required: true
        type: string

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Run the Dependency Review Action and capture logs
      - name: 'Dependency Review'
        run: |
          mkdir -p dependency_review
          actions/dependency-review-action@v4.6.0 2>&1 | tee dependency_review/dependency_review.txt

      # Upload the captured logs as an artifact
      - name: Upload dependency_review artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_id }}
          path: dependency_review/
