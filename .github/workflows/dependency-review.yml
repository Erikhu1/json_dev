# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required,
# PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
name: 'Dependency Review'
on:  
  workflow_call:
    inputs:
      artifact_id:
        description: 'Unique identifier for artifacts'
        required: true
        type: string


permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: 'Dependency Review'
        id: dep_review
        uses: actions/dependency-review-action@ce3cf9537a52e8119d91fd484ab5b8a807627bf8 # v4.6.0

      - name: Save Dependency Review summary
        run: |
          mkdir -p dependency_review
          echo "Dependency Review Result:" > dependency_review/summary.txt
          echo "fail-on-severity: ${{ steps.dep_review.outputs.fail-on-severity }}" >> dependency_review/summary.txt
          echo "fail-on-scopes: ${{ steps.dep_review.outputs.fail-on-scopes }}" >> dependency_review/summary.txt
          echo "allowed-ghsas: ${{ steps.dep_review.outputs.allowed-ghsas }}" >> dependency_review/summary.txt
          echo "deny-listed-ghsas: ${{ steps.dep_review.outputs.deny-listed-ghsas }}" >> dependency_review/summary.txt

      - name: Upload dependency_review artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_id }}
          path: dependency_review/
